<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- 문자 인코딩: 한글이 깨지지 않도록 UTF-8 설정 -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 독서 목록</title>

  <!-- Pretendard 웹폰트 연결 (CDN) -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
  />

  <!-- 우리가 만든 스타일 파일 연결 -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>2026 독서 목록</h1>

    <!-- 도서 입력/수정 폼: 월 / 책이름 / 작가 를 입력합니다.
         - 아무 행도 선택하지 않았을 때: '추가' 버튼으로 새 책 등록
         - 표에서 행을 클릭해 선택했을 때: '수정' / '삭제' 버튼 활성화 -->
    <form id="add-form" class="add-form">
      <input type="text" id="input-month" placeholder="월 (예: 3월)" required />
      <input type="text" id="input-title" placeholder="책이름" required />
      <input type="text" id="input-author" placeholder="작가" required />
      <!-- 추가: 폼 제출(submit) 버튼 -->
      <button type="submit" id="btn-add">추가</button>
      <!-- 수정/삭제/선택취소: 제출이 아닌 일반 버튼(type="button") -->
      <button type="button" id="btn-update" disabled>수정</button>
      <button type="button" id="btn-delete" disabled>삭제</button>
      <button type="button" id="btn-clear" disabled>선택취소</button>
    </form>

    <!-- 현재 선택 상태를 알려주는 안내 문구 -->
    <p id="select-info" class="select-info">표에서 행을 클릭하면 수정/삭제할 수 있습니다.</p>

    <!-- 검색창: 입력한 글자가 월/책이름/작가에 포함되면 화면에 보여줍니다 -->
    <div class="search-box">
      <input type="text" id="search-input" placeholder="월, 책이름, 작가로 검색" />
    </div>

    <!-- 오류가 발생하면 여기에 메시지를 보여줍니다 -->
    <p id="error" class="error" hidden></p>

    <!-- 데이터를 불러오는 동안 보여줄 안내 문구 -->
    <p id="loading" class="loading">데이터를 불러오는 중입니다...</p>

    <!-- 조회한 도서 정보를 표(table)로 출력합니다 -->
    <table id="book-table" hidden>
      <thead>
        <tr>
          <th>월</th>
          <th>책이름</th>
          <th>작가</th>
        </tr>
      </thead>
      <!-- 실제 데이터는 JavaScript가 이 tbody 안에 채워 넣습니다 -->
      <tbody id="book-list"></tbody>
    </table>
  </main>

  <!--
    script.js는 Supabase SDK를 import 하는 ES 모듈(module)이므로
    반드시 type="module" 을 붙여야 import 문법을 사용할 수 있습니다.
  -->
  <script type="module" src="script.js"></script>
</body>
</html>
