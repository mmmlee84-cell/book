<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <!-- 회원가입 페이지와 동일한 카드형 스타일(.card)을 공유 -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- 회원가입과 같은 auth 카드 -->
    <main class="card" role="main">
        <h1 class="card__title">로그인</h1>
        <p class="card__subtitle">가입하신 계정으로 로그인해 주세요.</p>

        <!-- novalidate: 브라우저 기본 검사 대신 JS로 직접 검사 -->
        <form id="login-form" novalidate>

            <!-- 이메일 -->
            <div class="field">
                <label for="email">이메일 <span class="required">*</span></label>
                <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" />
            </div>

            <!-- 비밀번호 + 보기/숨기기 토글 -->
            <div class="field">
                <label for="password">비밀번호 <span class="required">*</span></label>
                <div class="password-wrap">
                    <input type="password" id="password" name="password" placeholder="비밀번호" autocomplete="current-password" />
                    <button type="button" class="toggle-password" data-target="password" aria-label="비밀번호 표시">표시</button>
                </div>
            </div>

            <!-- 오류 / 안내 메시지 -->
            <p id="message" class="message" role="alert" hidden></p>

            <!-- 로그인 버튼 (로딩 스피너 포함) -->
            <div class="actions">
                <button type="submit" id="submit-btn" class="btn btn--primary">
                    <span class="btn__label">로그인</span>
                    <span class="spinner" hidden></span>
                </button>
            </div>

            <!-- 계정이 없는 사용자를 위한 회원가입 이동 버튼 -->
            <div class="actions">
                <!-- a 태그를 버튼처럼 보이게 스타일 공유 -->
                <a href="signup.html" class="btn btn--ghost">회원가입</a>
            </div>
        </form>
    </main>

    <script type="module" src="login.js"></script>
</body>
</html>
