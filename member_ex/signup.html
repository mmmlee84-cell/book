<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <!-- 반응형: 모바일 화면 폭에 맞춰 렌더링 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- 화면 가운데 배치되는 회원가입 카드 -->
    <main class="card" role="main">
        <h1 class="card__title">회원가입</h1>
        <p class="card__subtitle">아래 정보를 입력해 계정을 만들어 주세요.</p>

        <!-- novalidate: 브라우저 기본 검사 대신 JS로 직접 검사 -->
        <form id="signup-form" novalidate>

            <!-- 이름 (필수) -->
            <div class="field">
                <label for="name">이름 <span class="required">*</span></label>
                <input type="text" id="name" name="name" placeholder="홍길동" autocomplete="name" />
            </div>

            <!-- 이메일 (필수, 로그인 계정) -->
            <div class="field">
                <label for="email">이메일 <span class="required">*</span></label>
                <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" />
            </div>

            <!-- 비밀번호 (필수) + 보기/숨기기 버튼 -->
            <div class="field">
                <label for="password">비밀번호 <span class="required">*</span></label>
                <div class="password-wrap">
                    <input type="password" id="password" name="password" placeholder="6자 이상" autocomplete="new-password" />
                    <!-- data-target: 어떤 입력칸을 토글할지 지정 -->
                    <button type="button" class="toggle-password" data-target="password" aria-label="비밀번호 표시">표시</button>
                </div>
            </div>

            <!-- 비밀번호 확인 (필수) -->
            <div class="field">
                <label for="password-confirm">비밀번호 확인 <span class="required">*</span></label>
                <div class="password-wrap">
                    <input type="password" id="password-confirm" name="password-confirm" placeholder="비밀번호 재입력" autocomplete="new-password" />
                    <button type="button" class="toggle-password" data-target="password-confirm" aria-label="비밀번호 표시">표시</button>
                </div>
            </div>

            <!-- 전화번호 (선택) -->
            <div class="field">
                <label for="phone">전화번호</label>
                <input type="tel" id="phone" name="phone" placeholder="010-1234-5678" autocomplete="tel" />
            </div>

            <!-- 주소 (선택) -->
            <div class="field">
                <label for="address">주소</label>
                <input type="text" id="address" name="address" placeholder="서울시 ..." autocomplete="street-address" />
            </div>

            <!-- 프로필 이미지 (선택, Supabase Storage 업로드) -->
            <div class="field">
                <label for="profile-image">프로필 이미지</label>
                <input type="file" id="profile-image" name="profile-image" accept="image/*" />
                <!-- 선택한 이미지 미리보기 -->
                <img id="image-preview" class="image-preview" alt="미리보기" hidden />
            </div>

            <!-- 오류 / 안내 메시지 표시 영역 -->
            <p id="message" class="message" role="alert" hidden></p>

            <!-- 버튼 그룹 -->
            <div class="actions">
                <!-- submit: 회원가입 -->
                <button type="submit" id="submit-btn" class="btn btn--primary">
                    <span class="btn__label">회원가입</span>
                    <!-- 로딩 스피너 (기본 숨김) -->
                    <span class="spinner" hidden></span>
                </button>
                <!-- reset: 폼 초기화 -->
                <button type="reset" id="reset-btn" class="btn btn--ghost">초기화</button>
            </div>

            <!-- 로그인 페이지 이동 -->
            <p class="login-link">
                이미 계정이 있으신가요?
                <a href="login.html">로그인</a>
            </p>
        </form>
    </main>

    <!-- Supabase SDK (CDN, ES module) → 우리 코드 순서로 로드 -->
    <script type="module" src="signup.js"></script>
</body>
</html>
