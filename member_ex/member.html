<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원 관리</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <!-- 공통 버튼/메시지 스타일(style.css) + 이 페이지 전용 스타일(member.css) -->
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="member.css" />
</head>
<body class="admin-body">
    <main class="admin-container" role="main">

        <!-- 상단 헤더: 왼쪽 제목 / 오른쪽 로그아웃 -->
        <header class="admin-header">
            <div>
                <h1 class="admin-title">등록된 회원 목록</h1>
                <p class="admin-subtitle">가입한 회원을 검색하고 관리할 수 있습니다.</p>
            </div>
            <button type="button" id="logout-btn" class="btn btn--ghost logout-btn">로그아웃</button>
        </header>

        <!-- 검색창 + 새로고침 버튼 (가로 배치) -->
        <div class="toolbar">
            <input
                type="search"
                id="search-input"
                class="search-input"
                placeholder="이름 또는 이메일로 검색"
            />
            <button type="button" id="refresh-btn" class="btn btn--primary refresh-btn">새로고침</button>
        </div>

        <!-- 안내/오류/로딩 메시지 -->
        <p id="message" class="message">불러오는 중...</p>

        <!-- 테이블 영역: 좁은 화면에서 가로 스크롤 -->
        <div class="table-wrap">
            <table class="member-table">
                <thead>
                    <tr>
                        <th>프로필</th>
                        <th>이름</th>
                        <th>이메일</th>
                        <th>전화번호</th>
                        <th>주소</th>
                        <th>권한</th>
                    </tr>
                </thead>
                <!-- 회원 행은 JS가 채웁니다 -->
                <tbody id="member-tbody"></tbody>
            </table>
        </div>
    </main>

    <script type="module" src="member.js"></script>
</body>
</html>
