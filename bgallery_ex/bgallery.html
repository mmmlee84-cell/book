<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>갤러리 목록</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ============================================================
       카드 그리드 갤러리 (밀리 서재 스타일)
       ============================================================ */
    .gallery-container { max-width: 1200px; }

    /* 상단 툴바: 제목 + 이미지 등록 버튼 */
    .gallery-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }
    .gallery-top .page-title { margin: 0; text-align: left; }
    .upload-link {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 11px 18px;
      background: #212126;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 0;
      text-decoration: none;
      transition: background 0.15s ease;
    }
    .upload-link:hover { background: #000000; }

    @media (max-width: 520px) {
      .gallery-top { flex-direction: column; align-items: stretch; }
      .gallery-top .page-title { text-align: center; }
      .upload-link { justify-content: center; }
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 24px 20px;
    }

    /* 카드 전체를 클릭하면 수정 모달이 열림 */
    .card {
      position: relative;
      cursor: pointer;
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 0;
      background: #f1f1f3;
      display: block;
      transition: transform 0.15s ease, border-color 0.15s ease;
      border: 1px solid #e5e7eb;
    }
    .card:hover .card-thumb {
      transform: translateY(-2px);
      border-color: #212126;
    }

    .card-title {
      margin: 12px 2px 4px;
      font-size: 0.98rem;
      font-weight: 700;
      line-height: 1.35;
      color: #212126;
      /* 제목 최대 2줄 */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-desc {
      margin: 0 2px;
      font-size: 0.85rem;
      color: #57575b;
      line-height: 1.4;
      /* 설명 최대 1줄 */
      display: -webkit-box;
      -webkit-line-clamp: 1;
      line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* 우측 상단 삭제 버튼 */
    .card-delete {
      position: absolute;
      top: 8px;
      right: 8px;
      width: auto;
      height: auto;
      padding: 4px 8px;
      border: none;
      border-radius: 0;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-size: 0.8rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s ease, background 0.15s ease;
    }
    .card:hover .card-delete,
    .card:focus-within .card-delete { opacity: 1; }
    .card-delete:hover { background: #dc2626; }
    /* 터치 기기: 호버가 없으므로 항상 보이게 */
    @media (hover: none) {
      .card-delete { opacity: 1; }
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      color: #57575b;
      padding: 48px 0;
    }
    .empty.error { color: #dc2626; }

    button:disabled { opacity: 0.6; cursor: not-allowed; }

    /* 수정 모달 */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal[hidden] { display: none; }
    .modal-box {
      background: #fff;
      width: 100%;
      max-width: 420px;
      border-radius: 0;
      padding: 24px;
      border: 1px solid #e5e7eb;
    }
    .modal-box h2 { margin: 0 0 16px; font-size: 1.2rem; text-align: center; }
    .modal-box label {
      display: flex; flex-direction: column; gap: 6px;
      margin-bottom: 14px; font-size: 0.9rem; font-weight: 600; color: #212126;
    }
    .modal-box input, .modal-box textarea {
      width: 100%; padding: 10px 12px;
      border: 1px solid #d6d8dd; border-radius: 0;
      font-size: 1rem; font-family: inherit;
    }
    .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
    .modal-actions button {
      flex: 1; padding: 12px; border: none; border-radius: 0;
      font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    .btn-cancel { background: #f1f1f3; color: #212126; }
    .btn-save { background: #212126; color: #fff; }
    .btn-save:hover { background: #000000; }
  </style>
  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main class="container gallery-container">
    <div class="gallery-top">
      <h1 class="page-title">갤러리 목록</h1>
      <a href="upload.html" class="upload-link">이미지 등록</a>
    </div>

    <div id="gallery-grid" class="gallery-grid">
      <p class="empty">불러오는 중...</p>
    </div>
  </main>

  <!-- 수정 모달 -->
  <div id="edit-modal" class="modal" hidden>
    <div class="modal-box">
      <h2>이미지 수정</h2>
      <label>제목
        <input type="text" id="edit-title" />
      </label>
      <label>이미지 설명
        <textarea id="edit-desc" rows="3"></textarea>
      </label>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" id="edit-cancel">취소</button>
        <button type="button" class="btn-save" id="edit-save">저장</button>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // Supabase 설정
    // ============================================================
    const SUPABASE_URL = "https://cbpxesevkjqenhriumfm.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_FDubU2pFp8nA7n2I2ARjdQ_65HWe9Lt";
    const BUCKET = "bgallery";
    const TABLE = "bgallery";

    const grid = document.getElementById("gallery-grid");
    const modal = document.getElementById("edit-modal");
    const editTitle = document.getElementById("edit-title");
    const editDesc = document.getElementById("edit-desc");
    const editCancel = document.getElementById("edit-cancel");
    const editSave = document.getElementById("edit-save");

    let editingId = null; // 현재 수정 중인 행 id

    // 등록일 포맷: YYYY. MM. DD. 오전/오후 HH:MM:SS
    const dateFormatter = new Intl.DateTimeFormat("ko-KR", {
      year: "numeric", month: "2-digit", day: "2-digit",
      hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: true,
    });
    function formatDate(v) { return v ? dateFormatter.format(new Date(v)) : ""; }

    // Supabase 클라이언트
    let sb = null;
    if (window.supabase && window.supabase.createClient) {
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    // ------------------------------------------------------------
    // 목록 조회 + 렌더링
    // ------------------------------------------------------------
    async function loadGallery() {
      if (!sb) {
        grid.innerHTML =
          '<p class="empty error">Supabase SDK를 불러오지 못했습니다.</p>';
        return;
      }
      grid.innerHTML = '<p class="empty">불러오는 중...</p>';

      try {
        const { data, error } = await sb
          .from(TABLE)
          .select("id, title, image_name, image_url, description, created_at")
          .order("created_at", { ascending: false });

        if (error) throw error;

        if (!data || data.length === 0) {
          grid.innerHTML =
            '<p class="empty">등록된 이미지가 없습니다.</p>';
          return;
        }

        grid.innerHTML = "";
        data.forEach((row) => grid.appendChild(buildCard(row)));
      } catch (err) {
        console.error(err);
        grid.innerHTML =
          '<p class="empty error">불러오기 실패: ' +
          escapeHtml(err.message || String(err)) + "</p>";
      }
    }

    // 카드 한 개 생성 (클릭 → 수정, ✕ → 삭제)
    function buildCard(row) {
      const card = document.createElement("div");
      card.className = "card";
      // 카드(이미지) 클릭 → 수정 모달
      card.addEventListener("click", () => openEdit(row));

      const img = document.createElement("img");
      img.className = "card-thumb";
      img.src = row.image_url;
      img.alt = row.title || "";
      img.loading = "lazy";

      const title = document.createElement("p");
      title.className = "card-title";
      title.textContent = row.title || "";

      const desc = document.createElement("p");
      desc.className = "card-desc";
      desc.textContent = row.description || "";

      // ✕ 삭제 버튼 (카드 클릭 이벤트로 전파되지 않도록 stopPropagation)
      const btnDel = document.createElement("button");
      btnDel.className = "card-delete";
      btnDel.type = "button";
      btnDel.textContent = "삭제";
      btnDel.title = "삭제";
      btnDel.setAttribute("aria-label", "삭제");
      btnDel.addEventListener("click", (e) => {
        e.stopPropagation();
        removeRow(row, btnDel);
      });

      card.append(img, btnDel, title, desc);
      return card;
    }

    // ------------------------------------------------------------
    // 수정
    // ------------------------------------------------------------
    function openEdit(row) {
      editingId = row.id;
      editTitle.value = row.title || "";
      editDesc.value = row.description || "";
      modal.hidden = false;
    }
    function closeEdit() {
      modal.hidden = true;
      editingId = null;
    }
    editCancel.addEventListener("click", closeEdit);
    modal.addEventListener("click", (e) => { if (e.target === modal) closeEdit(); });

    editSave.addEventListener("click", async () => {
      const title = editTitle.value.trim();
      if (!title) { alert("제목을 입력하세요."); return; }

      editSave.disabled = true;
      try {
        const { error } = await sb
          .from(TABLE)
          .update({ title, description: editDesc.value.trim() })
          .eq("id", editingId);
        if (error) throw error;
        closeEdit();
        await loadGallery();
      } catch (err) {
        console.error(err);
        alert("수정 실패: " + (err.message || err));
      } finally {
        editSave.disabled = false;
      }
    });

    // ------------------------------------------------------------
    // 삭제 (DB 행 + 스토리지 이미지)
    // ------------------------------------------------------------
    async function removeRow(row, btn) {
      if (!confirm(`"${row.title}" 을(를) 삭제할까요?`)) return;

      btn.disabled = true;
      try {
        // 1) 스토리지 이미지 삭제
        if (row.image_name) {
          const { error: storageError } = await sb.storage
            .from(BUCKET)
            .remove([row.image_name]);
          if (storageError) throw storageError;
        }
        // 2) DB 행 삭제
        const { error: dbError } = await sb.from(TABLE).delete().eq("id", row.id);
        if (dbError) throw dbError;

        await loadGallery();
      } catch (err) {
        console.error(err);
        alert("삭제 실패: " + (err.message || err));
        btn.disabled = false;
      }
    }

    function escapeHtml(str) {
      return String(str == null ? "" : str)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    loadGallery();
  </script>
</body>
</html>
